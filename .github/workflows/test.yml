name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra tests --extra notebook

      - name: Install oasis-deconv (third-party, required for deconvolution)
        run: uv pip install --no-binary oasis-deconv oasis-deconv

      - name: Run tests with coverage
        run: uv run pytest tests/ -v --cov=placecell --cov-report=xml --cov-report=term

      - name: Run notebook smoke tests
        run: uv run pytest --nbmake notebook/view_results_arena.ipynb notebook/view_results_maze.ipynb -v

      - name: Code Coverage Summary
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11' && github.event_name == 'pull_request'
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
